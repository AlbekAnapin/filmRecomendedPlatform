<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Что посмотреть и почитать? — Гайд рекомендаций</title>
    <meta name="description" content="Введите любимый фильм или книгу, и нейросеть подберёт 3 идеальные рекомендации. Фильмы, сериалы, книги — что посмотреть и почитать.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f1a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        /* Заголовок */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header p {
            color: #9ca3af;
            font-size: 1.05rem;
        }

        /* Поле ввода */
        .search-box {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        .search-box label {
            display: block;
            font-size: 0.95rem;
            color: #a78bfa;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .search-box input {
            width: 100%;
            padding: 14px 18px;
            background: #12121f;
            border: 1px solid #2d2d4a;
            border-radius: 12px;
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            transition: border 0.2s;
        }

        .search-box input:focus {
            border-color: #a78bfa;
        }

        .search-box input::placeholder {
            color: #4b5563;
        }

        .search-btn {
            width: 100%;
            margin-top: 12px;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .search-btn:hover {
            opacity: 0.92;
        }

        .search-btn:active {
            transform: scale(0.98);
        }

        .search-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Результаты */
        .results {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 20px 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 4px solid transparent;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.2);
        }

        .card:nth-child(1) { border-left-color: #a78bfa; }
        .card:nth-child(2) { border-left-color: #60a5fa; }
        .card:nth-child(3) { border-left-color: #34d399; }

        .card-badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 4px 10px;
            border-radius: 20px;
            margin-bottom: 8px;
        }

        .badge-match { background: rgba(167, 139, 250, 0.15); color: #a78bfa; }
        .badge-surprise { background: rgba(96, 165, 250, 0.15); color: #60a5fa; }
        .badge-deep { background: rgba(52, 211, 153, 0.15); color: #34d399; }

        .card h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .card .reason {
            font-size: 0.9rem;
            color: #9ca3af;
            line-height: 1.5;
            margin-bottom: 14px;
        }

        .card .year {
            display: inline-block;
            font-size: 0.8rem;
            color: #6b7280;
            margin-bottom: 12px;
            margin-left: 4px;
        }

        .card-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-watch {
            padding: 10px 18px;
            background: #7c3aed;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s;
        }

        .btn-watch:hover { background: #6d28d9; }

        .btn-trailer {
            padding: 10px 18px;
            background: transparent;
            color: #a78bfa;
            border: 1px solid #3d3d5c;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s;
        }

        .btn-trailer:hover { background: rgba(167, 139, 250, 0.08); }

        /* Сообщение об ошибке */
        .error-message {
            text-align: center;
            padding: 30px;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 12px;
        }

        /* Футер */
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #4b5563;
            font-size: 0.85rem;
        }

        /* Адаптив */
        @media (max-width: 500px) {
            .header h1 { font-size: 1.6rem; }
            .card-buttons { flex-direction: column; }
            .btn-watch, .btn-trailer { text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Заголовок -->
        <div class="header">
            <h1>🎬 Что посмотреть и почитать?</h1>
            <p>Введите любимый фильм или книгу — получите три точные рекомендации</p>
        </div>

        <!-- Поиск -->
        <div class="search-box">
            <label for="searchInput">Что вам понравилось из последнего?</label>
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Например: Довод, Три товарища, Аркейн..."
                autocomplete="off"
                onkeydown="if(event.key==='Enter') search()"
            >
            <button class="search-btn" id="searchBtn" onclick="search()">🔍 Найти похожее</button>
        </div>

        <!-- Блок для рекламы AdSense -->
        <div style="text-align:center; margin-bottom: 24px; min-height: 90px;">
            <!-- Сюда вставите код AdSense, когда зарегистрируетесь -->
        </div>

        <!-- Результаты -->
        <div class="results" id="results"></div>

        <!-- Футер -->
        <div class="footer">
            Рекомендации подбираются нейросетью DeepSeek. Партнёрские ссылки могут приносить комиссию.
        </div>
    </div>

    <script>
        // Базовый URL вашего Cloudflare Worker. Замените на свой после деплоя.
        const API_URL = 'https://vash-proxy.ваш-домен.workers.dev';
        // Для локального тестирования можно использовать:
        // const API_URL = 'http://localhost:8787';

        async function search() {
            const input = document.getElementById('searchInput').value.trim();
            const resultsDiv = document.getElementById('results');
            const searchBtn = document.getElementById('searchBtn');
            
            if (input === '') {
                alert('Введите название фильма или книги 😊');
                return;
            }

            // Блокируем кнопку на время запроса
            searchBtn.disabled = true;
            searchBtn.textContent = '⏳ Ищу...';

            // Показываем загрузку
            resultsDiv.innerHTML = `
                <div style="text-align:center; padding:40px;">
                    <p style="color:#a78bfa; font-size:1.1rem;">🔍 Ищем похожее на «${escapeHtml(input)}»...</p>
                    <p style="color:#6b7280; font-size:0.9rem;">Нейросеть подбирает рекомендации</p>
                </div>
            `;

            try {
                // Запрос к Cloudflare Worker
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: input })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Ошибка сервера');
                }

                const data = await response.json();

                // Рендерим три карточки
                resultsDiv.innerHTML = '';

                if (data.direct_match) {
                    resultsDiv.innerHTML += createCard(
                        '🎯 Прямое попадание',
                        'badge-match',
                        data.direct_match.title,
                        data.direct_match.reason,
                        data.direct_match.type,
                        data.direct_match.year
                    );
                }

                if (data.surprise) {
                    resultsDiv.innerHTML += createCard(
                        '🔄 Неожиданный поворот',
                        'badge-surprise',
                        data.surprise.title,
                        data.surprise.reason,
                        data.surprise.type,
                        data.surprise.year
                    );
                }

                if (data.deep_dive) {
                    resultsDiv.innerHTML += createCard(
                        '🌊 Глубокое погружение',
                        'badge-deep',
                        data.deep_dive.title,
                        data.deep_dive.reason,
                        data.deep_dive.type,
                        data.deep_dive.year
                    );
                }

                if (!data.direct_match && !data.surprise && !data.deep_dive) {
                    resultsDiv.innerHTML = '<div class="error-message">Не удалось подобрать рекомендации. Попробуйте другой запрос.</div>';
                }

            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="error-message">
                        <p>Ой, что-то пошло не так 😔</p>
                        <p style="font-size:0.9rem; margin-top:8px;">${escapeHtml(error.message)}</p>
                    </div>
                `;
                console.error(error);
            } finally {
                // Разблокируем кнопку
                searchBtn.disabled = false;
                searchBtn.textContent = '🔍 Найти похожее';
            }
        }

        // Функция сборки карточки
        function createCard(badgeText, badgeClass, title, reason, type, year) {
            const isBook = type === 'book';
            const buttonLabel = isBook ? '📖 Читать на Литресе' : '▶ Смотреть на Кинопоиске';
            const buttonUrl = isBook 
                ? 'https://www.litres.ru/pages/rmd_partner/?partner=ВАША_ПАРТНЁРСКАЯ_ССЫЛКА&search=' + encodeURIComponent(title)
                : 'https://hd.kinopoisk.ru/?utm_source=filmguide&search=' + encodeURIComponent(title);
            
            return `
                <div class="card">
                    <span class="card-badge ${badgeClass}">${badgeText}</span>
                    <h3>${escapeHtml(title)} ${year ? '<span class="year">(' + year + ')</span>' : ''}</h3>
                    <p class="reason">${escapeHtml(reason)}</p>
                    <div class="card-buttons">
                        <a href="${buttonUrl}" class="btn-watch" target="_blank" rel="nofollow sponsored">${buttonLabel}</a>
                        <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(title + ' трейлер')}" class="btn-trailer" target="_blank" rel="nofollow">🎬 Трейлер</a>
                    </div>
                </div>
            `;
        }

        // Защита от XSS
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
