<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Что посмотреть и почитать? — Гайд рекомендаций</title>
    <meta name="description" content="Персональные рекомендации фильмов и книг. Выберите жанр или напишите пожелания — нейросеть подберёт лучшее.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0b14;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container { max-width: 800px; width: 100%; }
        .header { text-align: center; margin-bottom: 28px; }
        .header h1 {
            font-size: 2.4rem; font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #818cf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 8px;
        }
        .header p { color: #9ca3af; font-size: 1.05rem; }

        .search-box {
            background: #1a1a2e; border-radius: 20px; padding: 24px;
            margin-bottom: 28px; box-shadow: 0 12px 30px rgba(0,0,0,0.5);
        }
        .search-box label {
            display: block; font-size: 0.9rem; color: #c084fc;
            margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .search-box input[type="text"] {
            width: 100%; padding: 12px 18px; background: #0f0f1f;
            border: 1px solid #2d2d4a; border-radius: 14px; color: #fff;
            font-size: 1rem; outline: none; transition: border 0.2s; margin-bottom: 12px;
        }
        .search-box input:focus { border-color: #c084fc; }
        .genre-tags {
            display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0;
        }
        .genre-tag {
            background: #1e1e32; border: 1px solid #2d2d4a;
            padding: 8px 16px; border-radius: 30px; font-size: 0.85rem;
            color: #cbd5e1; cursor: pointer; user-select: none;
            transition: all 0.2s; font-weight: 500;
        }
        .genre-tag:hover { border-color: #9333ea; color: #fff; background: #2d2d4a; }
        .genre-tag.selected {
            background: #9333ea; border-color: #9333ea; color: #fff;
            box-shadow: 0 0 12px rgba(147, 51, 234, 0.3);
        }
        .pref-row {
            display: flex; gap: 12px; margin: 12px 0; flex-wrap: wrap; align-items: center;
        }
        .checkbox-group {
            display: flex; gap: 16px; align-items: center;
        }
        .checkbox-group label { color: #cbd5e1; font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .search-btn {
            width: 100%; margin-top: 16px; padding: 14px;
            background: linear-gradient(135deg, #9333ea, #4f46e5);
            border: none; border-radius: 14px; color: #fff;
            font-size: 1.05rem; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .search-btn:hover { opacity: 0.92; }
        .search-btn:active { transform: scale(0.97); }
        .search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .results-section { margin-bottom: 32px; }
        .section-title {
            font-size: 1.5rem; font-weight: 700; margin-bottom: 16px;
            color: #c084fc; border-bottom: 1px solid #2d2d4a; padding-bottom: 8px;
        }
        .card {
            background: #1a1a2e; border-radius: 18px; padding: 20px 24px;
            margin-bottom: 14px; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            border: 1px solid #2d2d4a; transition: transform 0.2s, box-shadow 0.2s;
            animation: fadeInUp 0.3s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(147, 51, 234, 0.2); border-color: #9333ea; }
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .card-emoji { font-size: 1.8rem; background: rgba(255,255,255,0.08); width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 12px; }
        .card-title { font-size: 1.2rem; font-weight: 700; }
        .card-meta { display: flex; flex-wrap: wrap; gap: 8px; margin: 6px 0; }
        .tag {
            background: rgba(147, 51, 234, 0.15); color: #c084fc;
            padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
        }
        .tag.year { background: rgba(129, 140, 248, 0.15); color: #a5b4fc; }
        .tag.rating { background: rgba(52, 211, 153, 0.15); color: #34d399; }
        .reason, .description {
            font-size: 0.95rem; color: #9ca3af; line-height: 1.5; margin-bottom: 8px;
        }
        .description { color: #b0b7c3; font-style: italic; margin-bottom: 14px; }
        .platform-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
        .btn {
            padding: 8px 14px; border-radius: 10px; font-size: 0.85rem; font-weight: 600;
            text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
            transition: background 0.2s; border: 1px solid transparent;
        }
        .btn-kp { background: #e65100; color: #fff; } .btn-kp:hover { background: #bf360c; }
        .btn-ivi { background: #d32f2f; color: #fff; } .btn-ivi:hover { background: #b71c1c; }
        .btn-okko { background: #7b1fa2; color: #fff; } .btn-okko:hover { background: #6a1b9a; }
        .btn-litres { background: #fbc02d; color: #1a1a2e; } .btn-litres:hover { background: #f9a825; }
        .btn-bookmate { background: #00bcd4; color: #fff; } .btn-bookmate:hover { background: #0097a7; }
        .btn-trailer {
            background: transparent; color: #cbd5e1; border: 1px solid #3d3d5c;
        }
        .btn-trailer:hover { background: rgba(255,255,255,0.05); border-color: #9333ea; }
        .loading { text-align: center; padding: 40px; color: #c084fc; font-size: 1.1rem; }
        .error-message { text-align: center; padding: 30px; color: #ef4444; background: rgba(239,68,68,0.1); border-radius: 16px; }
        .footer { text-align: center; margin-top: 40px; color: #4b5563; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 Что посмотреть и почитать?</h1>
            <p>Выберите жанры, напишите пожелания — и получите персональные рекомендации</p>
        </div>

        <div class="search-box">
            <label for="searchInput">🔍 Что вам понравилось? (необязательно)</label>
            <input type="text" id="searchInput" placeholder="Например: Довод, Аркейн, Три товарища...">

            <label style="margin-top: 16px;">🎭 Жанры (выберите один или несколько)</label>
            <div class="genre-tags" id="genreTags">
                <span class="genre-tag" data-genre="комедия">Комедия</span>
                <span class="genre-tag" data-genre="драма">Драма</span>
                <span class="genre-tag" data-genre="фантастика">Фантастика</span>
                <span class="genre-tag" data-genre="ужасы">Ужасы</span>
                <span class="genre-tag" data-genre="триллер">Триллер</span>
                <span class="genre-tag" data-genre="детектив">Детектив</span>
                <span class="genre-tag" data-genre="мелодрама">Мелодрама</span>
                <span class="genre-tag" data-genre="боевик">Боевик</span>
                <span class="genre-tag" data-genre="фэнтези">Фэнтези</span>
                <span class="genre-tag" data-genre="аниме">Аниме</span>
                <span class="genre-tag" data-genre="документальное">Документальное</span>
                <span class="genre-tag" data-genre="историческое">Историческое</span>
            </div>

            <input type="text" id="preferencesInput" placeholder="Дополнительные пожелания (например: лёгкое, с хорошим юмором, 90-е)">

            <div class="pref-row">
                <div class="checkbox-group">
                    <label><input type="checkbox" id="filmsCheck" checked> 🎥 Фильмы</label>
                    <label><input type="checkbox" id="booksCheck" checked> 📚 Книги</label>
                </div>
            </div>
            <button class="search-btn" id="searchBtn" onclick="search()">🔍 Найти рекомендации</button>
        </div>

        <div id="resultsContainer"></div>
        <div class="footer">Рекомендации подбираются нейросетью Groq. Партнёрские ссылки могут приносить комиссию.</div>
    </div>

    <script>
        const API_URL = 'https://film-recomended-platform-albekanapins-projects.vercel.app/api/recommend';
        let selectedGenres = [];

        // Обработка выбора жанров
        document.querySelectorAll('.genre-tag').forEach(tag => {
            tag.addEventListener('click', function() {
                const genre = this.dataset.genre;
                if (this.classList.contains('selected')) {
                    this.classList.remove('selected');
                    selectedGenres = selectedGenres.filter(g => g !== genre);
                } else {
                    this.classList.add('selected');
                    selectedGenres.push(genre);
                }
            });
        });

        async function search() {
            const query = document.getElementById('searchInput').value.trim();
            const preferences = document.getElementById('preferencesInput').value.trim();
            const searchFilms = document.getElementById('filmsCheck').checked;
            const searchBooks = document.getElementById('booksCheck').checked;
            const genres = selectedGenres;

            if (!query && !preferences && genres.length === 0) {
                alert('Заполните хотя бы одно поле: название, пожелания или выберите жанр');
                return;
            }

            const btn = document.getElementById('searchBtn');
            btn.disabled = true; btn.textContent = '⏳ Ищу...';
            const container = document.getElementById('resultsContainer');
            container.innerHTML = '<div class="loading">🔍 Ищем для вас персональные рекомендации...</div>';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, preferences, searchFilms, searchBooks, genres })
                });
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'Ошибка сервера');
                }
                const data = await response.json();
                container.innerHTML = '';

                if (data.films && data.films.length > 0) {
                    const section = document.createElement('div');
                    section.className = 'results-section';
                    section.innerHTML = '<div class="section-title">🎬 Фильмы и сериалы</div>';
                    const cardsContainer = document.createElement('div');
                    data.films.forEach(film => cardsContainer.appendChild(createFilmCard(film)));
                    section.appendChild(cardsContainer);
                    container.appendChild(section);
                }

                if (data.books && data.books.length > 0) {
                    const section = document.createElement('div');
                    section.className = 'results-section';
                    section.innerHTML = '<div class="section-title">📚 Книги</div>';
                    const cardsContainer = document.createElement('div');
                    data.books.forEach(book => cardsContainer.appendChild(createBookCard(book)));
                    section.appendChild(cardsContainer);
                    container.appendChild(section);
                }

                if ((!data.films || data.films.length === 0) && (!data.books || data.books.length === 0)) {
                    container.innerHTML = '<div class="error-message">Ничего не найдено. Попробуйте изменить запрос.</div>';
                }
            } catch (error) {
                container.innerHTML = `<div class="error-message">😔 ${escapeHtml(error.message)}</div>`;
                console.error(error);
            } finally {
                btn.disabled = false; btn.textContent = '🔍 Найти рекомендации';
            }
        }

        function createFilmCard(film) {
            const card = document.createElement('div');
            card.className = 'card';
            const typeEmoji = film.type === 'series' ? '📺' : '🎬';
            const typeText = film.type === 'series' ? 'Сериал' : 'Фильм';
            const genres = film.genres?.map(g => `<span class="tag">${g}</span>`).join('') || '';
            const year = film.year ? `<span class="tag year">📅 ${film.year}</span>` : '';
            const rating = film.rating ? `<span class="tag rating">⭐ ${film.rating}</span>` : '';
            const description = film.description ? `<div class="description">📖 ${escapeHtml(film.description)}</div>` : '';

            card.innerHTML = `
                <div class="card-header">
                    <div class="card-emoji">${typeEmoji}</div>
                    <div>
                        <div class="card-title">${escapeHtml(film.title)}</div>
                        <div class="card-meta">
                            <span class="tag">${typeText}</span> ${year} ${rating} ${genres}
                        </div>
                    </div>
                </div>
                <div class="reason">💡 ${escapeHtml(film.reason || '')}</div>
                ${description}
                <div class="platform-buttons">
                    <a href="https://hd.kinopoisk.ru/search/${encodeURIComponent(film.title)}" target="_blank" rel="nofollow" class="btn btn-kp">▶ Кинопоиск</a>
                    <a href="https://www.ivi.ru/search/?q=${encodeURIComponent(film.title)}" target="_blank" rel="nofollow" class="btn btn-ivi">▶ IVI</a>
                    <a href="https://okko.tv/search/${encodeURIComponent(film.title)}" target="_blank" rel="nofollow" class="btn btn-okko">▶ Okko</a>
                    <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(film.title + ' трейлер')}" target="_blank" rel="nofollow" class="btn btn-trailer">🎬 Трейлер</a>
                </div>
            `;
            return card;
        }

        function createBookCard(book) {
            const card = document.createElement('div');
            card.className = 'card';
            const genres = book.genres?.map(g => `<span class="tag">${g}</span>`).join('') || '';
            const year = book.year ? `<span class="tag year">📅 ${book.year}</span>` : '';
            const rating = book.rating ? `<span class="tag rating">⭐ ${book.rating}</span>` : '';
            const description = book.description ? `<div class="description">📖 ${escapeHtml(book.description)}</div>` : '';

            card.innerHTML = `
                <div class="card-header">
                    <div class="card-emoji">📖</div>
                    <div>
                        <div class="card-title">${escapeHtml(book.title)}</div>
                        <div class="card-meta">
                            <span class="tag">Книга</span> ${year} ${rating} ${genres}
                        </div>
                    </div>
                </div>
                <div class="reason">💡 ${escapeHtml(book.reason || '')}</div>
                ${description}
                <div class="platform-buttons">
                    <a href="https://www.litres.ru/search/?q=${encodeURIComponent(book.title)}" target="_blank" rel="nofollow" class="btn btn-litres">📖 Литрес</a>
                    <a href="https://bookmate.ru/search?query=${encodeURIComponent(book.title)}" target="_blank" rel="nofollow" class="btn btn-bookmate">📘 Букмейт</a>
                    <a href="https://www.labirint.ru/search/${encodeURIComponent(book.title)}" target="_blank" rel="nofollow" class="btn btn-trailer">🔗 Лабиринт</a>
                </div>
            `;
            return card;
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
