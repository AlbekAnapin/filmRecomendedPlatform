<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Что посмотреть и почитать? — Гайд рекомендаций</title>
    <meta name="description" content="Введите любимый фильм или книгу, и нейросеть подберёт 3 идеальные рекомендации. Фильмы, сериалы, книги — что посмотреть и почитать.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0b14;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 780px;
            width: 100%;
        }
        /* Заголовок */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .header p {
            color: #9ca3af;
            font-size: 1.05rem;
        }
        /* Поле ввода */
        .search-box {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 28px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
        }
        .search-box label {
            display: block;
            font-size: 0.9rem;
            color: #c084fc;
            margin-bottom: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .search-box input {
            width: 100%;
            padding: 14px 18px;
            background: #0f0f1f;
            border: 1px solid #2d2d4a;
            border-radius: 14px;
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            transition: border 0.2s;
        }
        .search-box input:focus {
            border-color: #c084fc;
        }
        .search-box input::placeholder {
            color: #4b5563;
        }
        .search-btn {
            width: 100%;
            margin-top: 14px;
            padding: 14px;
            background: linear-gradient(135deg, #9333ea, #4f46e5);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.3px;
        }
        .search-btn:hover {
            opacity: 0.92;
        }
        .search-btn:active {
            transform: scale(0.97);
        }
        .search-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        /* Категории */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 28px;
            justify-content: center;
        }
        .category-chip {
            background: #1e1e32;
            border: 1px solid #2d2d4a;
            padding: 10px 18px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .category-chip:hover {
            background: #2d2d4a;
            border-color: #9333ea;
            color: #fff;
            transform: translateY(-2px);
        }
        .category-chip.active {
            background: #9333ea;
            border-color: #9333ea;
            color: #fff;
        }
        /* Результаты */
        .results {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .card {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 22px 26px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #2d2d4a;
            animation: fadeInUp 0.35s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(147, 51, 234, 0.2);
            border-color: #9333ea;
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 10px;
        }
        .card-emoji {
            font-size: 2rem;
            background: rgba(255,255,255,0.08);
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
        }
        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.2px;
        }
        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }
        .tag {
            background: rgba(147, 51, 234, 0.15);
            color: #c084fc;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .tag.year {
            background: rgba(129, 140, 248, 0.15);
            color: #a5b4fc;
        }
        .tag.rating {
            background: rgba(52, 211, 153, 0.15);
            color: #34d399;
        }
        .card .reason {
            font-size: 0.95rem;
            color: #9ca3af;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        .card-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .btn-watch {
            background: #9333ea;
            color: #fff;
            border: none;
        }
        .btn-watch:hover {
            background: #7e22ce;
        }
        .btn-trailer {
            background: transparent;
            color: #cbd5e1;
            border: 1px solid #3d3d5c;
        }
        .btn-trailer:hover {
            background: rgba(255,255,255,0.05);
            border-color: #9333ea;
        }
        .btn-share {
            background: transparent;
            border: 1px solid #3d3d5c;
            color: #cbd5e1;
            padding: 10px;
        }
        .btn-share:hover {
            background: rgba(255,255,255,0.05);
        }
        .error-message {
            text-align: center;
            padding: 30px;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 16px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #c084fc;
            font-size: 1.1rem;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #4b5563;
            font-size: 0.85rem;
        }
        @media (max-width: 500px) {
            .header h1 { font-size: 1.8rem; }
            .card-buttons { flex-direction: column; }
            .btn { text-align: center; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 Что посмотреть и почитать?</h1>
            <p>Введите любимый фильм или книгу — получите три точные рекомендации</p>
        </div>

        <div class="search-box">
            <label for="searchInput">Что вам понравилось из последнего?</label>
            <input type="text" id="searchInput" placeholder="Например: Довод, Три товарища, Аркейн..." autocomplete="off" onkeydown="if(event.key==='Enter') search()">
            <button class="search-btn" id="searchBtn" onclick="search()">🔍 Найти похожее</button>
        </div>

        <!-- Категории подборок -->
        <div class="categories" id="categories">
            <button class="category-chip" data-prompt="лучшие фильмы 2025-2026 года">🏆 Топ-10 новинок</button>
            <button class="category-chip" data-prompt="комедии для вечера">😂 Комедии</button>
            <button class="category-chip" data-prompt="фильмы с неожиданным финалом">🤯 Сюжетные повороты</button>
            <button class="category-chip" data-prompt="семейные фильмы для просмотра с детьми">👨‍👩‍👧‍👦 Для семьи</button>
            <button class="category-chip" data-prompt="романтические фильмы на вечер">❤️ Романтика</button>
            <button class="category-chip" data-prompt="научная фантастика и фэнтези">🚀 Фантастика</button>
            <button class="category-chip" data-prompt="интересные книги, которые стоит прочитать">📚 Книги</button>
        </div>

        <div class="results" id="results"></div>

        <div class="footer">
            Рекомендации подбираются нейросетью Groq (Llama 3.3). Партнёрские ссылки могут приносить комиссию.
        </div>
    </div>

    <script>
        const API_URL = 'https://film-recomended-platform-albekanapins-projects.vercel.app/api/recommend';

        async function search(queryOverride) {
            const inputField = document.getElementById('searchInput');
            const query = queryOverride || inputField.value.trim();
            const resultsDiv = document.getElementById('results');
            const searchBtn = document.getElementById('searchBtn');

            if (!query) {
                alert('Введите название или выберите категорию 😊');
                return;
            }

            searchBtn.disabled = true;
            searchBtn.textContent = '⏳ Ищу...';

            resultsDiv.innerHTML = '<div class="loading">🔍 Ищем похожее на «' + escapeHtml(query) + '»...</div>';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || 'Ошибка сервера');
                }

                const data = await response.json();
                resultsDiv.innerHTML = '';

                if (data.direct_match) addCard(resultsDiv, '🎯 Прямое попадание', data.direct_match);
                if (data.surprise) addCard(resultsDiv, '🔄 Неожиданный поворот', data.surprise);
                if (data.deep_dive) addCard(resultsDiv, '🌊 Глубокое погружение', data.deep_dive);

                if (!data.direct_match && !data.surprise && !data.deep_dive) {
                    resultsDiv.innerHTML = '<div class="error-message">Не удалось подобрать рекомендации. Попробуйте другой запрос.</div>';
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error-message">😔 ${escapeHtml(error.message)}</div>`;
                console.error(error);
            } finally {
                searchBtn.disabled = false;
                searchBtn.textContent = '🔍 Найти похожее';
            }
        }

        function addCard(container, badgeText, item) {
            const card = document.createElement('div');
            card.className = 'card';

            const typeEmoji = item.type === 'book' ? '📖' : '🎬';
            const typeLabel = item.type === 'book' ? 'Книга' : item.type === 'series' ? 'Сериал' : 'Фильм';
            const yearTag = item.year ? `<span class="tag year">📅 ${item.year}</span>` : '';
            const ratingTag = item.rating ? `<span class="tag rating">⭐ ${item.rating}</span>` : '';
            const genreTags = item.genres ? item.genres.map(g => `<span class="tag">${g}</span>`).join('') : '';

            card.innerHTML = `
                <div class="card-header">
                    <div class="card-emoji">${typeEmoji}</div>
                    <div>
                        <div class="card-title">${escapeHtml(item.title)}</div>
                        <div class="card-meta">
                            <span class="tag">${typeLabel}</span>
                            ${yearTag}
                            ${ratingTag}
                            ${genreTags}
                        </div>
                    </div>
                </div>
                <div class="reason">${escapeHtml(item.reason || '')}</div>
                <div class="card-buttons">
                    <a href="${item.type === 'book' ? 'https://www.litres.ru/search/?q=' + encodeURIComponent(item.title) : 'https://hd.kinopoisk.ru/search/' + encodeURIComponent(item.title)}" target="_blank" rel="nofollow sponsored" class="btn btn-watch">
                        ${item.type === 'book' ? '📖 Читать' : '▶ Смотреть'}
                    </a>
                    <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(item.title + ' трейлер')}" target="_blank" rel="nofollow" class="btn btn-trailer">🎬 Трейлер</a>
                    <button class="btn btn-share" onclick="share('${escapeHtml(item.title)}')" title="Поделиться">🔗</button>
                </div>
            `;
            container.appendChild(card);
        }

        function share(title) {
            const url = window.location.href;
            const text = `🎬 Советую посмотреть: ${title}. Нашёл через сервис «Что посмотреть?» ${url}`;
            if (navigator.share) {
                navigator.share({ title: 'Рекомендация', text, url });
            } else {
                navigator.clipboard.writeText(text).then(() => {
                    alert('Ссылка скопирована! Делитесь с друзьями.');
                });
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Обработчики категорий
        document.querySelectorAll('.category-chip').forEach(chip => {
            chip.addEventListener('click', function() {
                const prompt = this.dataset.prompt;
                document.getElementById('searchInput').value = '';
                search(prompt);
                // Подсветка активной категории
                document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
